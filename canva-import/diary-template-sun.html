<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Weekly Diary (columns, landscape, Sun-start)</title>
<style>
  @page { size: A4 landscape; margin: 0; }
  @media screen { .sheet + .sheet { margin-top: 26px; } }
  @media print { html, body { background: #fff !important; } .sheet { page-break-after: always; } .sheet:last-child { page-break-after: auto; } }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }

  .sheet { width: 1123px; height: 794px; background: #faf3ec; padding: 34px 42px; display: flex; flex-direction: column; }
  .spread { flex: 1; display: flex; min-height: 0; }
  .page { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 0 18px; }
  .spine { flex: 0 0 26px; background: linear-gradient(90deg, transparent, rgba(90,60,36,0.14) 45%, rgba(90,60,36,0.14) 55%, transparent); }

  .head { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 10px; }
  .brand { display: inline-flex; align-items: center; gap: 7px; font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .bloom-mark { width: 20px; height: 20px; color: #b16038; flex: 0 0 auto; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }

  .cols { flex: 1; display: flex; min-height: 0; }
  .day { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 0 9px; border-right: 1px solid #e8d9cc; }
  .day:last-child { border-right: none; }
  .day-head { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; }
  .date { font-size: 22px; font-weight: 700; color: #4a3f35; line-height: 1; }
  .dow { font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #857262; }
  .lines { flex: 1; display: flex; flex-direction: column; }
  .lines i { flex: 1; min-height: 22px; border-bottom: 1px solid #e8d9cc; font-style: normal; }

  .weekend { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; padding-left: 9px; border-left: 1px solid #e8d9cc; }
  .half { flex: 1; display: flex; flex-direction: column; }
  .half + .half { border-top: 1px solid #e8d9cc; padding-top: 4px; }
  .half .lines i { min-height: 16px; }

  .rows { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .strip { flex: 1; display: flex; flex-direction: column; border-bottom: 1px solid #efe3d3; padding: 3px 0; min-height: 0; }
  .strip-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .strip-day { font-size: 15px; font-weight: 700; color: #4a3f35; }
  .strip-day .dow { font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #857262; margin-left: 6px; }
  .strip-prompt { font-style: italic; font-size: 11px; color: #b16038; }
  .strip-lines { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .strip-lines i { flex: 1; min-height: 11px; border-bottom: 1px solid #ecdfce; font-style: normal; }
  .weekend-row { flex: 1; display: flex; min-height: 0; border-bottom: 1px solid #efe3d3; padding: 3px 0; }
  .weekend-half { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 0 8px; }
  .weekend-half:first-child { border-right: 1px solid #efe3d3; }

  /* Footer band: a slim, fixed strip along the bottom. overflow:hidden + shrinkable rows keep
   *  the boxes from ballooning the footer to fit their content (the bug that ate the day area). */
  .foot { flex: 0 0 116px; display: flex; gap: 10px; margin-top: 10px; min-height: 0; }
  .box { flex: 1; border: 1px solid #e8d9cc; border-radius: 8px; background: #fdf6ea; padding: 7px 12px 8px; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .box-title { font-family: Arial, sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #b16038; font-weight: 700; margin-bottom: 5px; }
  .box-row { flex: 1; display: flex; align-items: flex-end; gap: 8px; min-height: 3px; }
  .box-row .tick { width: 11px; height: 11px; border: 1.5px solid #b16038; border-radius: 3px; flex: 0 0 auto; }
  .box-row .rule, .reset-row .rule { flex: 1; border-bottom: 1px solid #ecdfce; }
  .box-day { font-family: Arial, sans-serif; font-size: 10px; font-weight: 700; color: #a07f5f; width: 26px; flex: 0 0 auto; }
  .mini-month { flex: 0 0 40%; }
  /* No aspect-ratio on the cells — on a wide footer box a square grid grows very tall. Let the 6
   *  rows share the box height instead so the mini-month always fits the footer band. */
  .mm-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; gap: 2px; flex: 1; }
  .mm-dow { text-align: center; font-family: Arial, sans-serif; font-size: 9px; color: #b7a08c; font-weight: 700; }
  .mm-cell { border-radius: 2px; background: #ecdfce; }
  .mm-cell.now { background: #b16038; }
  .mm-cell.out { background: transparent; }
  .notes-box .plain-lines, .box .plain-lines { flex: 1; display: flex; flex-direction: column; }
  .plain-lines i { flex: 1; min-height: 6px; border-bottom: 1px solid #ecdfce; }
  .water-row { display: flex; align-items: center; gap: 5px; min-height: 15px; flex: 1; }
  .water-pip { width: 11px; height: 11px; border: 1.4px solid #cdbfa8; border-radius: 50%; flex: 0 0 auto; }
  .reset-row { flex: 1; display: flex; align-items: flex-end; gap: 8px; min-height: 16px; }
  .reset-label { font-family: Arial, sans-serif; font-size: 10px; font-weight: 700; color: #a07f5f; width: 82px; flex: 0 0 auto; }
  .palette { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); grid-auto-rows: minmax(150px, 1fr); gap: 14px; }
  .palette .box, .palette .mini-month { flex: none; }
  .quotes { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 22px 26px; align-content: center; }
  .quote { display: flex; align-items: center; justify-content: center; text-align: center; padding: 8px; }
  .q-serif { font-family: Georgia, serif; font-size: 26px; color: #4a3f35; }
  .q-italic { font-family: Georgia, serif; font-style: italic; font-size: 24px; color: #b16038; }
  .q-caps { font-family: Arial, sans-serif; font-size: 15px; letter-spacing: 0.18em; text-transform: uppercase; color: #857262; }
  .q-big { font-family: Georgia, serif; font-weight: 700; font-size: 30px; color: #4a3f35; }
  /* ── Cycle & fertility (gentle TTC helper) ── */
  .cyc-sheet { gap: 0; }
  .cyc-intro { font-family: Georgia, serif; font-style: italic; font-size: 12px; line-height: 1.5; color: #6d5f52; margin: 8px 0; }
  .cyc-stats { display: flex; gap: 18px; flex-wrap: wrap; font-family: Arial, sans-serif; font-size: 11px; color: #857262; margin-bottom: 8px; }
  .cyc-stats b { color: #b16038; letter-spacing: 0.06em; }
  .cyc-chart-head { display: grid; grid-template-columns: 62px repeat(var(--days), 1fr); }
  .cyc-dnum { text-align: center; font-family: Arial, sans-serif; font-size: 7px; color: #a07f5f; }
  .cyc-grid { display: grid; grid-template-columns: 62px repeat(var(--days), 1fr); grid-auto-rows: 1fr; border: 1px solid #e2d3c2; border-radius: 4px; overflow: hidden; }
  .cyc-tlabel { font-family: Arial, sans-serif; font-size: 7px; color: #b7a08c; display: flex; align-items: center; justify-content: flex-end; padding-right: 3px; }
  .cyc-cell { border-right: 1px solid #f2e9db; border-bottom: 1px solid #f2e9db; }
  .cyc-cell:nth-child(7n+1) { background: rgba(184,138,99,0.04); }
  .cyc-note { font-family: Georgia, serif; font-style: italic; font-size: 10.5px; line-height: 1.45; color: #8a7a6a; margin: 7px 0; }
  .cyc-track { display: flex; flex-direction: column; gap: 3px; }
  .cyc-trow { display: grid; grid-template-columns: 62px repeat(var(--days), 1fr); align-items: stretch; min-height: 17px; }
  .cyc-tlabel2 { font-family: Arial, sans-serif; font-size: 9px; font-weight: 700; color: #a07f5f; display: flex; align-items: center; }
  .cyc-tcell { border-right: 1px solid #f2e9db; border-bottom: 1px solid #ecdfce; display: flex; align-items: center; justify-content: center; }
  .cyc-bleed { width: 11px; height: 11px; border: 1.3px solid #cdbfa8; border-radius: 50%; }
  .cyc-close { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .cyc-key { font-family: Arial, sans-serif; font-size: 9px; color: #9a8a79; }
  .cyc-stats2 { font-family: Arial, sans-serif; font-size: 10px; color: #857262; }
  .cyc-stats2 b { color: #b16038; letter-spacing: 0.06em; }
  .cyc-support { font-family: Georgia, serif; font-style: italic; font-size: 12.5px; line-height: 1.5; color: #b16038; text-align: center; margin: 10px 0 0; }
  /* Cycle FOOTER widget (compact this-week strip) */
  .cyc-foot-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px 2px; align-items: center; margin: 2px 0 4px; }
  .cyc-foot-dow { text-align: center; font-family: Arial, sans-serif; font-size: 8px; font-weight: 700; color: #b7a08c; }
  .cyc-foot-dot { justify-self: center; width: 13px; height: 13px; border: 1.3px solid #cdbfa8; border-radius: 50%; }
  .cyc-foot-heart { text-align: center; font-size: 11px; color: #cf8f8f; line-height: 1; }
  .cyc-foot-temp { display: flex; align-items: center; gap: 5px; font-family: Arial, sans-serif; font-size: 9px; color: #857262; margin-bottom: 3px; }
  .cyc-foot-key { font-family: Arial, sans-serif; font-size: 7.5px; color: #a99a8a; line-height: 1.3; }
  .sheet.zebra .lines i:nth-child(even), .sheet.zebra .strip-lines i:nth-child(even) { background: rgba(184, 138, 99, 0.09); }
</style>
</head>
