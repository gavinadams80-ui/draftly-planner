<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Weekly Diary Template (strips)</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }

  .sheet {
    width: 1123px; height: 794px;
    background: #faf3ec;
    padding: 34px 42px;
    display: flex;
    flex-direction: column;
  }
  .spread { flex: 1; display: flex; min-height: 0; }
  .page { flex: 1; display: flex; flex-direction: column; min-width: 0; padding: 0 18px; }
  .spine { flex: 0 0 26px; background: linear-gradient(90deg, transparent, rgba(90,60,36,0.14) 45%, rgba(90,60,36,0.14) 55%, transparent); }

  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 10px; }
  .brand { font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }

  /* Horizontal day bands: three full-width rows, then a 4th row for footer content. */
  .rows { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .strip { flex: 1; display: flex; flex-direction: column; border-bottom: 1px solid #efe3d3; padding: 3px 0; min-height: 0; }
  .strip-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .strip-day { font-size: 15px; font-weight: 700; color: #4a3f35; }
  .strip-day .dow { font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #857262; margin-left: 6px; }
  .strip-prompt { font-style: italic; font-size: 11px; color: #b16038; }
  .strip-lines { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .strip-lines i { flex: 1; min-height: 4px; border-bottom: 1px solid #ecdfce; font-style: normal; }

  /* The weekend row: Sat and Sun side by side, sharing the third row's height. */
  .weekend-row { flex: 1; display: flex; min-height: 0; border-bottom: 1px solid #efe3d3; padding: 3px 0; }
  .weekend-half { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 0 8px; }
  .weekend-half:first-child { border-right: 1px solid #efe3d3; }
  .weekend-half .strip-lines i { min-height: 3px; }

  .foot { flex: 0 0 150px; display: flex; gap: 10px; margin-top: 10px; }
  .box { flex: 1; border: 1px solid #e8d9cc; border-radius: 8px; background: #fdf6ea; padding: 8px 12px 10px; display: flex; flex-direction: column; }
  .box-title { font-family: Arial, sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #b16038; font-weight: 700; margin-bottom: 6px; }
  .box-row { flex: 1; display: flex; align-items: flex-end; gap: 8px; min-height: 16px; }
  .box-row .tick { width: 12px; height: 12px; border: 1.5px solid #b16038; border-radius: 3px; flex: 0 0 auto; }
  .box-row .rule { flex: 1; border-bottom: 1px solid #ecdfce; font-family: Arial, sans-serif; font-size: 12px; color: #857262; }
  .box-day { font-family: Arial, sans-serif; font-size: 10px; font-weight: 700; color: #a07f5f; width: 22px; flex: 0 0 auto; }

  .mini-month { flex: 0 0 42%; }
  .mm-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; flex: 1; }
  .mm-dow { text-align: center; font-family: Arial, sans-serif; font-size: 9px; color: #b7a08c; font-weight: 700; }
  .mm-cell { aspect-ratio: 1; border-radius: 3px; background: #ecdfce; }
  .mm-cell.now { background: #b16038; }
  .mm-cell.out { background: transparent; }

  .notes-box .strip-lines { flex: 1; }
  .notes-box .strip-lines i { min-height: 6px; border-bottom: 1px solid #ecdfce; }
</style>
</head>
<body>
  <div class="sheet" data-document-role="page" data-label="Draftly weekly diary — strips (open book, horizontal bands)">

    <div class="spread">

      <!-- LEFT PAGE — Mon / Tue / Wed as horizontal bands + this week's dinners -->
      <div class="page">
        <div class="head">
          <span class="brand">Draftly</span>
          <span class="ctx">July 2026</span>
        </div>
        <div class="rows">
          <div class="strip">
            <div class="strip-head"><span class="strip-day">14 <span class="dow">Mon</span></span><span class="strip-prompt">hello, lovely ✿</span></div>
            <div class="strip-lines"><i></i><i></i><i></i></div>
          </div>
          <div class="strip">
            <div class="strip-head"><span class="strip-day">15 <span class="dow">Tue</span></span><span class="strip-prompt">you're doing great</span></div>
            <div class="strip-lines"><i></i><i></i><i></i></div>
          </div>
          <div class="strip">
            <div class="strip-head"><span class="strip-day">16 <span class="dow">Wed</span></span><span class="strip-prompt">one thing at a time</span></div>
            <div class="strip-lines"><i></i><i></i><i></i></div>
          </div>
        </div>
        <div class="foot">
          <div class="box">
            <span class="box-title">This week's dinners</span>
            <div class="box-row"><span class="box-day">Mon</span><span class="rule"></span></div>
            <div class="box-row"><span class="box-day">Tue</span><span class="rule"></span></div>
            <div class="box-row"><span class="box-day">Wed</span><span class="rule"></span></div>
            <div class="box-row"><span class="box-day">Thu</span><span class="rule"></span></div>
            <div class="box-row"><span class="box-day">Fri</span><span class="rule"></span></div>
            <div class="box-row"><span class="box-day">Sat</span><span class="rule"></span></div>
            <div class="box-row"><span class="box-day">Sun</span><span class="rule"></span></div>
          </div>
        </div>
      </div>

      <div class="spine"></div>

      <!-- RIGHT PAGE — Thu / Fri bands, then Sat | Sun side by side + mini month & notes -->
      <div class="page">
        <div class="head">
          <span class="ctx">Week 29</span>
          <span class="brand">Draftly</span>
        </div>
        <div class="rows">
          <div class="strip">
            <div class="strip-head"><span class="strip-day">17 <span class="dow">Thu</span></span><span class="strip-prompt">be kind to you today</span></div>
            <div class="strip-lines"><i></i><i></i><i></i></div>
          </div>
          <div class="strip">
            <div class="strip-head"><span class="strip-day">18 <span class="dow">Fri</span></span><span class="strip-prompt">small steps still count</span></div>
            <div class="strip-lines"><i></i><i></i><i></i></div>
          </div>
          <div class="weekend-row">
            <div class="weekend-half">
              <div class="strip-head"><span class="strip-day">19 <span class="dow">Sat</span></span></div>
              <div class="strip-lines"><i></i><i></i></div>
            </div>
            <div class="weekend-half">
              <div class="strip-head"><span class="strip-day">20 <span class="dow">Sun</span></span></div>
              <div class="strip-lines"><i></i><i></i></div>
            </div>
          </div>
        </div>
        <div class="foot">
          <div class="box mini-month">
            <span class="box-title">July</span>
            <div class="mm-grid">
              <span class="mm-dow">M</span><span class="mm-dow">T</span><span class="mm-dow">W</span><span class="mm-dow">T</span><span class="mm-dow">F</span><span class="mm-dow">S</span><span class="mm-dow">S</span>
              <span class="mm-cell out"></span><span class="mm-cell out"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span>
              <span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell now"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span>
              <span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span>
              <span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span><span class="mm-cell"></span>
              <span class="mm-cell"></span><span class="mm-cell out"></span><span class="mm-cell out"></span><span class="mm-cell out"></span><span class="mm-cell out"></span><span class="mm-cell out"></span><span class="mm-cell out"></span>
            </div>
          </div>
          <div class="box notes-box">
            <span class="box-title">Notes</span>
            <div class="strip-lines"><i></i><i></i><i></i></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
