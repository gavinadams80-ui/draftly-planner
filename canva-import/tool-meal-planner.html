<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Meal Planner Template</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }
  .sheet { width: 1123px; height: 794px; background: #faf3ec; padding: 34px 42px; display: flex; flex-direction: column; }
  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 6px; }
  .brand { font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }
  .sub { font-family: Arial, sans-serif; font-size: 13px; color: #857262; font-style: italic; margin: 0 0 12px; }
  .body { flex: 1; display: flex; gap: 16px; min-height: 0; }
  .grid { flex: 3; display: grid; grid-template-columns: 70px repeat(7, 1fr); grid-template-rows: 22px repeat(4, 1fr); gap: 3px; }
  .dow { text-align: center; font-family: Arial, sans-serif; font-size: 10px; font-weight: 700; color: #857262; text-transform: uppercase; }
  .meal-label { font-family: Arial, sans-serif; font-size: 10px; color: #a07f5f; font-weight: 700; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 0.06em; }
  .cell { border: 1px solid #e8d9cc; border-radius: 4px; background: #fdf6ea; }
  .shop { flex: 1; border: 1px solid #e8d9cc; border-radius: 8px; background: #fdf6ea; padding: 10px 14px; display: flex; flex-direction: column; }
  .shop-title { font-family: Arial, sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #b16038; font-weight: 700; margin-bottom: 8px; }
  .shop-row { display: flex; align-items: center; gap: 8px; flex: 1; }
  .tick { width: 10px; height: 10px; border: 1.5px solid #b16038; border-radius: 3px; flex: 0 0 auto; }
  .rule { flex: 1; border-bottom: 1px solid #ecdfce; }
</style>
</head>
<body>
  <div class="sheet" data-document-role="page" data-label="Draftly meal planner">
    <div class="head"><span class="brand">Draftly</span><span class="ctx">Meal Planner</span></div>
    <p class="sub">plan · shop · prep — one less decision every day</p>
    <div class="body">
      <div class="grid">
        <span></span><span class="dow">Mon</span><span class="dow">Tue</span><span class="dow">Wed</span><span class="dow">Thu</span><span class="dow">Fri</span><span class="dow">Sat</span><span class="dow">Sun</span>
        <div class="meal-label">breakfast</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="meal-label">lunch</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="meal-label">dinner</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="meal-label">snacks</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <div class="shop">
        <span class="shop-title">Shopping list</span>
        <div class="shop-row"><span class="tick"></span><span class="rule"></span></div>
        <div class="shop-row"><span class="tick"></span><span class="rule"></span></div>
        <div class="shop-row"><span class="tick"></span><span class="rule"></span></div>
        <div class="shop-row"><span class="tick"></span><span class="rule"></span></div>
        <div class="shop-row"><span class="tick"></span><span class="rule"></span></div>
        <div class="shop-row"><span class="tick"></span><span class="rule"></span></div>
        <div class="shop-row"><span class="tick"></span><span class="rule"></span></div>
        <div class="shop-row"><span class="tick"></span><span class="rule"></span></div>
      </div>
    </div>
  </div>
</body>
</html>
