<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Day Page Template</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }
  .sheet { width: 1123px; height: 794px; background: #faf3ec; padding: 34px 42px; display: flex; flex-direction: column; }
  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 14px; }
  .brand { font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }
  .body { flex: 1; display: flex; gap: 20px; min-height: 0; }
  .hours { flex: 2; display: flex; flex-direction: column; }
  .hours i { flex: 1; min-height: 4px; border-bottom: 1px solid #e8d9cc; font-style: normal; position: relative; }
  .hours i .t { position: absolute; left: 1px; top: 0; font-family: Arial, sans-serif; font-size: 9px; color: #c8b8a2; }
  .side { flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .box { flex: 1; border: 1px solid #e8d9cc; border-radius: 8px; background: #fdf6ea; padding: 10px 14px; display: flex; flex-direction: column; }
  .box-title { font-family: Arial, sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #b16038; font-weight: 700; margin-bottom: 8px; }
  .box .rule { flex: 1; border-bottom: 1px solid #ecdfce; min-height: 4px; }
</style>
</head>
<body>
  <div class="sheet" data-document-role="page" data-label="Draftly day page">
    <div class="head"><span class="brand">Draftly</span><span class="ctx">Wednesday, 16 July 2026</span></div>
    <div class="body">
      <div class="hours">
        <i><span class="t">7am</span></i><i><span class="t">8am</span></i><i><span class="t">9am</span></i><i><span class="t">10am</span></i><i><span class="t">11am</span></i>
        <i><span class="t">12pm</span></i><i><span class="t">1pm</span></i><i><span class="t">2pm</span></i><i><span class="t">3pm</span></i><i><span class="t">4pm</span></i>
        <i><span class="t">5pm</span></i><i><span class="t">6pm</span></i><i><span class="t">7pm</span></i><i><span class="t">8pm</span></i><i><span class="t">9pm</span></i>
      </div>
      <div class="side">
        <div class="box"><span class="box-title">top 3 today</span><span class="rule"></span><span class="rule"></span><span class="rule"></span></div>
        <div class="box"><span class="box-title">notes</span><span class="rule"></span><span class="rule"></span><span class="rule"></span><span class="rule"></span><span class="rule"></span><span class="rule"></span></div>
      </div>
    </div>
  </div>
</body>
</html>
