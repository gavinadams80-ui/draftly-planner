<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Mood & Energy Template</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }
  .sheet { width: 1123px; height: 794px; background: #faf3ec; padding: 34px 42px; display: flex; flex-direction: column; }
  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 6px; }
  .brand { font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }
  .sub { font-family: Arial, sans-serif; font-size: 13px; color: #857262; font-style: italic; margin: 0 0 10px; }
  .legend { display: flex; gap: 20px; margin-bottom: 16px; font-family: Arial, sans-serif; font-size: 11px; color: #857262; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .table { flex: 1; display: grid; grid-template-columns: 60px repeat(31, 1fr); grid-template-rows: 24px 1fr 1fr; gap: 3px; }
  .h-label { font-family: Arial, sans-serif; font-size: 9px; color: #b7a08c; text-align: center; font-weight: 700; }
  .row-label { font-family: Arial, sans-serif; font-size: 11px; color: #4a3f35; font-weight: 700; display: flex; align-items: center; }
  .cell { border: 1px solid #ecdfce; border-radius: 3px; background: #fdf6ea; }
</style>
</head>
<body>
  <div class="sheet" data-document-role="page" data-label="Draftly mood and energy">
    <div class="head"><span class="brand">Draftly</span><span class="ctx">Mood & Energy</span></div>
    <p class="sub">check in each day — a symbol for mood, a mark for energy (1 low – 5 full)</p>
    <div class="legend"><span>☀️ sunny</span><span>🙂 okay</span><span>😐 meh</span><span>🌧️ stormy</span><span>🌫️ foggy</span></div>
    <div class="table">

      <span class="h-label">11</span><span class="h-label">12</span><span class="h-label">13</span><span class="h-label">14</span><span class="h-label">15</span><span class="h-label">16</span><span class="h-label">17</span><span class="h-label">18</span><span class="h-label">19</span><span class="h-label">20</span>

      <div class="row-label">mood</div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

  </div>
</body>
</html>
