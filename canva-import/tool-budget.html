<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Budget Tracker Template</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }
  .sheet { width: 1123px; height: 794px; background: #faf3ec; padding: 34px 42px; display: flex; flex-direction: column; }
  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 6px; }
  .brand { font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }
  .sub { font-family: Arial, sans-serif; font-size: 13px; color: #857262; font-style: italic; margin: 0 0 14px; }
  .table { flex: 1; display: flex; flex-direction: column; border: 1px solid #e8d9cc; border-radius: 8px; overflow: hidden; background: #fdf6ea; }
  .row { flex: 1; display: grid; grid-template-columns: 1.4fr 1fr 1fr 2fr; border-bottom: 1px solid #ecdfce; align-items: center; padding: 0 14px; }
  .row:last-child { border-bottom: none; }
  .row.head-row { background: #f3e2cf; font-family: Arial, sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #b16038; font-weight: 700; }
  .cat { font-size: 15px; color: #4a3f35; }
  .amt { border-bottom: 1px solid #ecdfce; height: 18px; margin-right: 10px; }
  .notes { border-bottom: 1px solid #ecdfce; height: 18px; }
</style>
</head>
<body>
  <div class="sheet" data-document-role="page" data-label="Draftly budget tracker">
    <div class="head"><span class="brand">Draftly</span><span class="ctx">Budget Tracker</span></div>
    <p class="sub">income · expenses · savings — one gentle page a month</p>
    <div class="table">
      <div class="row head-row"><span>category</span><span>planned</span><span>actual</span><span>notes</span></div>
      <div class="row"><span class="cat">Income</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
      <div class="row"><span class="cat">Housing</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
      <div class="row"><span class="cat">Food</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
      <div class="row"><span class="cat">Transport</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
      <div class="row"><span class="cat">Health</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
      <div class="row"><span class="cat">Personal</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
      <div class="row"><span class="cat">Subscriptions</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
      <div class="row"><span class="cat">Savings</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
      <div class="row"><span class="cat">Other</span><span class="amt"></span><span class="amt"></span><span class="notes"></span></div>
    </div>
  </div>
</body>
</html>
