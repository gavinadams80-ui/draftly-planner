<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Vision & Bucket List Template</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }
  .sheet { width: 1123px; height: 794px; background: #faf3ec; padding: 34px 42px; display: flex; flex-direction: column; }
  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 6px; }
  .brand { font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }
  .sub { font-family: Arial, sans-serif; font-size: 13px; color: #857262; font-style: italic; margin: 0 0 14px; }
  .grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 14px; }
  .card { border: 1px solid #e8d9cc; border-radius: 10px; background: #fdf6ea; padding: 12px 14px; display: flex; flex-direction: column; }
  .tag { font-family: Arial, sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #b16038; font-weight: 700; margin-bottom: 6px; }
  .title-line { font-size: 15px; border-bottom: 1px solid #e6d6c4; padding-bottom: 6px; margin-bottom: 8px; }
  .desc { flex: 1; border-bottom: 1px solid #ecdfce; font-family: Arial, sans-serif; font-size: 11px; color: #857262; }
</style>
</head>
<body>
  <div class="sheet" data-document-role="page" data-label="Draftly vision and bucket list">
    <div class="head"><span class="brand">Draftly</span><span class="ctx">Vision &amp; Bucket List</span></div>
    <p class="sub">dreams, plans, inspo — the joys worth planning for</p>
    <div class="grid">
      <div class="card"><span class="tag">holiday</span><span class="title-line"></span><span class="desc"></span></div>
      <div class="card"><span class="tag">home</span><span class="title-line"></span><span class="desc"></span></div>
      <div class="card"><span class="tag">health</span><span class="title-line"></span><span class="desc"></span></div>
      <div class="card"><span class="tag">dreams</span><span class="title-line"></span><span class="desc"></span></div>
      <div class="card"><span class="tag">someday</span><span class="title-line"></span><span class="desc"></span></div>
      <div class="card"><span class="tag">someday</span><span class="title-line"></span><span class="desc"></span></div>
    </div>
  </div>
</body>
</html>
