<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Weekly Reset Template</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }
  .sheet { width: 1123px; height: 794px; background: #faf3ec; padding: 34px 42px; display: flex; flex-direction: column; }
  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 6px; }
  .brand { font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }
  .sub { font-family: Arial, sans-serif; font-size: 13px; color: #857262; font-style: italic; margin: 0 0 14px; }
  .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; }
  .card { border: 1px solid #e8d9cc; border-radius: 10px; background: #fdf6ea; padding: 14px 18px; display: flex; flex-direction: column; }
  .label { font-family: Arial, sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: #b16038; font-weight: 700; margin-bottom: 8px; }
  .rule { flex: 1; border-bottom: 1px solid #ecdfce; min-height: 4px; }
</style>
</head>
<body>
  <div class="sheet" data-document-role="page" data-label="Draftly weekly reset">
    <div class="head"><span class="brand">Draftly</span><span class="ctx">Weekly Reset</span></div>
    <p class="sub">a gentle look back before the next week begins</p>
    <div class="grid">
      <div class="card"><span class="label">went well</span><span class="rule"></span><span class="rule"></span><span class="rule"></span></div>
      <div class="card"><span class="label">felt hard</span><span class="rule"></span><span class="rule"></span><span class="rule"></span></div>
      <div class="card"><span class="label">carry forward</span><span class="rule"></span><span class="rule"></span><span class="rule"></span></div>
      <div class="card"><span class="label">let go</span><span class="rule"></span><span class="rule"></span><span class="rule"></span></div>
    </div>
  </div>
</body>
</html>
