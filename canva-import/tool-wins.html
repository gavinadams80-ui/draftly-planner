<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Draftly — Wins & Done Template</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e9e2d8; }
  body { font-family: Georgia, 'Times New Roman', serif; }
  .sheet { width: 1123px; height: 794px; background: #faf3ec; padding: 34px 42px; display: flex; flex-direction: column; }
  .head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #e8d9cc; padding-bottom: 6px; margin-bottom: 6px; }
  .brand { font-weight: 700; font-size: 20px; color: #b16038; letter-spacing: 0.02em; }
  .ctx { font-family: Arial, sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #857262; }
  .sub { font-family: Arial, sans-serif; font-size: 13px; color: #857262; font-style: italic; margin: 0 0 14px; }
  .list { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .row { flex: 1; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #e8d9cc; padding-bottom: 8px; }
  .star { font-size: 20px; color: #b16038; }
  .date { font-family: Arial, sans-serif; font-size: 11px; color: #a07f5f; width: 60px; flex: 0 0 auto; }
  .rule { flex: 1; border-bottom: 1px solid #ecdfce; font-size: 16px; }
</style>
</head>
<body>
  <div class="sheet" data-document-role="page" data-label="Draftly wins and done">
    <div class="head"><span class="brand">Draftly</span><span class="ctx">Wins &amp; Done</span></div>
    <p class="sub">proof you did stuff — celebrate the small things too</p>
    <div class="list">
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
      <div class="row"><span class="star">⭐</span><span class="date">______</span><span class="rule"></span></div>
    </div>
  </div>
</body>
</html>
